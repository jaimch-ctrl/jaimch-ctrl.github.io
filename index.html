<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三保單整合現金流試算 V3</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont;
    background:#0f0f0f;
    color:#fff;
    margin:0;
}
.container{
    padding:20px;
    max-width:1200px;
    margin:auto;
}
h1{
    font-size:20px;
    margin-bottom:20px;
}
.box{
    background:#1c1c1e;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}
input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:5px;
    background:#2c2c2e;
    color:#fff;
}
textarea{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#2c2c2e;
    color:#fff;
}
button{
    width:100%;
    padding:14px;
    background:#000;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:16px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    font-size:12px;
}
td,th{
    padding:6px;
    text-align:center;
}
th{
    color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>三保單整合現金流試算｜V3</h1>

<div class="box">
年領目標 (TWD)
<input id="goal" value="120000">

匯率
<input id="fx" value="31">
</div>

<div class="box">
<h3>保單 A</h3>
本金 <input id="a_pr" value="40000">
利率 % <input id="a_rate" value="4.2">
</div>

<div class="box">
<h3>保單 B</h3>
本金 <input id="b_pr" value="15635">
利率 % <input id="b_rate" value="4.2">
</div>

<div class="box">
<h3>保單 C</h3>
本金 <input id="c_pr" value="27445">
利率 % <input id="c_rate" value="2.6">
</div>

<button onclick="run()">一鍵產生分析</button>

<div class="box">
<h3>現況判讀（你自己填）</h3>
<textarea rows="3"></textarea>
</div>

<div class="box">
<h3>顧問結論（你自己講話）</h3>
<textarea rows="3"></textarea>
</div>

<div class="box">
<h3>風險提醒</h3>
<textarea rows="3"></textarea>
</div>

<table id="table"></table>

</div>

<script>

function run(){

let fx = parseFloat(document.getElementById("fx").value);
let goal = parseFloat(document.getElementById("goal").value)/fx;

let a = parseFloat(a_pr.value);
let b = parseFloat(b_pr.value);
let c = parseFloat(c_pr.value);

let ar = a_rate.value/100;
let br = b_rate.value/100;
let cr = c_rate.value/100;

let html = `
<tr>
<th>年</th>
<th>A期初</th><th>A利息</th><th>A領回</th><th>A期末</th>
<th>B期初</th><th>B利息</th><th>B領回</th><th>B期末</th>
<th>C期初</th><th>C利息</th><th>C領回</th><th>C期末</th>
<th>總資產</th>
</tr>
`;

for(let i=1;i<=15;i++){

let ai = a*ar;
let bi = b*br;
let ci = c*cr;

let withdraw = goal;

let wa = Math.min(ai, withdraw);
withdraw -= wa;

let wb = Math.min(bi, withdraw);
withdraw -= wb;

let wc = Math.min(ci, withdraw);
withdraw -= wc;

a = a + ai - wa;
b = b + bi - wb;
c = c + ci - wc;

let total = a+b+c;

html += `
<tr>
<td>${i}</td>

<td>${Math.round(a)}</td>
<td>${Math.round(ai)}</td>
<td>${Math.round(wa)}</td>
<td>${Math.round(a)}</td>

<td>${Math.round(b)}</td>
<td>${Math.round(bi)}</td>
<td>${Math.round(wb)}</td>
<td>${Math.round(b)}</td>

<td>${Math.round(c)}</td>
<td>${Math.round(ci)}</td>
<td>${Math.round(wc)}</td>
<td>${Math.round(c)}</td>

<td>${Math.round(total)}</td>
</tr>
`;
}

document.getElementById("table").innerHTML = html;

}

</script>

</body>
</html>
