<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客製報告</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont;
    background:#f5f5f5;
    margin:0;
}

.container{
    max-width:520px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
}

h1{
    font-size:20px;
    margin-bottom:16px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:black;
    color:white;
    font-size:16px;
}

.result{
    background:#111;
    color:white;
    padding:16px;
    border-radius:12px;
    margin-top:10px;
    line-height:1.6;
}

img{
    width:100%;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1 id="title">客製報告</h1>

<input id="name" placeholder="客戶姓名">
<input id="target" placeholder="年繳目標">
<input id="a" placeholder="A保單">
<input id="b" placeholder="B保單">
<input id="c" placeholder="C保單">

<input type="file" accept="image/*" onchange="loadImg(event)">

<button onclick="calc()">一鍵產生分析</button>

<img id="preview">
</div>

<div class="card">
<div id="output" class="result"></div>
</div>

</div>

<script>

function loadImg(e){
    const reader=new FileReader();
    reader.onload=function(){
        document.getElementById('preview').src=reader.result;
    }
    reader.readAsDataURL(e.target.files[0]);
}

function calc(){

    let name=document.getElementById('name').value||"客戶";
    let target=Number(document.getElementById('target').value||0);
    let a=Number(document.getElementById('a').value||0);
    let b=Number(document.getElementById('b').value||0);
    let c=Number(document.getElementById('c').value||0);

    let total=a+b+c;

    document.getElementById('title').innerText=name+"｜客製報告";

    let text="";

    if(total<target){
        text=`目前整體規劃是 ${total}，距離你的目標 ${target} 還有差距。
這個結構不是不好，但明顯偏保守。
我會建議你把重點放在拉高現金流效率，而不是只是堆保費。`;
    }
    else if(total>target){
        text=`你現在的配置 ${total} 已經超過目標 ${target}。
這代表你其實已經在用比較高強度的方式在做規劃。
下一步不是再買，而是要開始優化配置比例。`;
    }
    else{
        text=`你的配置剛好落在目標 ${target}。
這種狀況其實很好，但關鍵不是剛好，而是穩定。
接下來要看的會是結構，而不是數字本身。`;
    }

    document.getElementById('output').innerText=text;
}

</script>

</body>
</html>
